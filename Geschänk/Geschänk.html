<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gökyüzü Hediyesi - Yengeç Burcu</title>
    <style>
        /* 1. GENEL SAYFA AYARLARI */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }

        /* GİRİŞ EKRANI (Tarayıcıların müzik engellemesini aşmak ve sürpriz efekti yaratmak için) */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020617;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 1s ease, visibility 1s ease;
            cursor: pointer;
            padding: 20px;
            text-align: center;
        }

        #welcome-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: 400;
            color: #fbbf24;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
        }

        .welcome-sub {
            font-size: 15px;
            color: #94a3b8;
            letter-spacing: 1px;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        #space-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* TAKIM YILDIZI ÇİZGİLERİ */
        .constellation-line {
            stroke: rgba(255, 255, 255, 0.35);
            stroke-width: 3px;
            stroke-dasharray: 8 6;
            pointer-events: none;
        }

        /* 2. YENGEÇ BURCU YILDIZLARI */
        .cancer-star {
            fill: #ffffff;
            stroke: rgba(255, 255, 255, 0.4);
            stroke-width: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cancer-star:hover, .cancer-star:active {
            fill: #fbbf24;
            stroke: rgba(251, 191, 36, 0.7);
            stroke-width: 18px;
            r: 10px;
        }

        /* Yıldız İsimleri Etiketleri */
        .star-label {
            font-size: 14px;
            fill: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            letter-spacing: 0.5px;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.05; }
            50% { opacity: 0.8; }
        }

        /* MÜZİK KONTROL BUTONU (Sağ Üst) */
        .music-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 16px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.4);
        }

        .music-btn.playing {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.5);
        }

        /* 3. MESAJ KARTLARININ TASARIMI */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 30px rgba(251, 191, 36, 0.08);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1) translateY(0);
        }

        .modal-card h2 {
            margin-top: 0;
            color: #fbbf24;
            font-size: 22px;
            font-weight: 600;
        }

        .modal-card p {
            color: #cbd5e1;
            line-height: 1.6;
            font-size: 16px;
            margin: 20px 0 30px 0;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #f8fafc;
            padding: 14px 24px;
            font-size: 15px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .close-btn:hover, .close-btn:active {
            background: #ffffff;
            color: #0f172a;
            border-color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- GİRİŞ PERDESİ (Müziğin doğrudan çalabilmesi için kullanıcı etkileşimi şarttır) -->
    <div id="welcome-screen">
        <div class="welcome-title">Sana Özel Bir Gökyüzü... ✨</div>
        <div class="welcome-sub">Giriş Yapmak İçin Ekrana Dokun</div>
    </div>

    <!-- MÜZİK ÇALAR -->
    <audio id="bg-audio" loop>
        <source src="muzik.mp3" type="audio/mpeg">
    </audio>

    <!-- MÜZİK KONTROL BUTONU (Başlangıçta otomatik çalacağı için 'Durdur' modunda başlar) -->
    <button id="music-toggle" class="music-btn playing">
        <span id="music-icon">⏸️</span>
        <span id="music-text">Durdur</span>
    </button>

    <svg id="space-canvas" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
        
        <g transform="translate(500, 500) scale(5.5) translate(-500, -500)" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.05" pointer-events="none">
            <path d="M 525 480 C 515 473, 495 470, 480 470 C 460 470, 465 493, 480 493 A 8 8 0 1 0 479.9 493" />
            <path d="M 475 520 C 485 527, 505 530, 520 530 C 540 530, 535 507, 520 507 A 8 8 0 1 0 520.1 507" />
        </g>

        <g id="constellation-paths">
            <line class="constellation-line" x1="500" y1="500" x2="410" y2="612" />
            <line class="constellation-line" x1="500" y1="500" x2="492" y2="410" />
            <line class="constellation-line" x1="492" y1="410" x2="462" y2="315" />
            <line class="constellation-line" x1="500" y1="500" x2="612" y2="590" />
        </g>

        <circle id="star-tegmine" class="cancer-star" cx="462" cy="315" r="6" />
        <text x="477" y="320" class="star-label">Tegmine</text>

        <circle id="star-borealis" class="cancer-star" cx="492" cy="410" r="7" />
        <text x="507" y="415" class="star-label">Asellus Borealis</text>

        <circle id="star-australis" class="cancer-star" cx="500" cy="500" r="8" />
        <text x="515" y="505" class="star-label">Asellus Australis</text>

        <circle id="star-acubens" class="cancer-star" cx="410" cy="612" r="6" />
        <text x="395" y="617" class="star-label" text-anchor="end">Acubens</text> 

        <circle id="star-altarf" class="cancer-star" cx="612" cy="590" r="8" />
        <text x="627" y="595" class="star-label">Altarf</text>

    </svg>

    <div class="modal-overlay" id="message-modal">
        <div class="modal-card">
            <h2 id="modal-title">Yıldız Başlığı</h2>
            <p id="modal-text">Buraya arkadaşına yazacağın mesaj gelecek.</p>
            <button class="close-btn" id="close-modal">Gökyüzüne Dön</button>
        </div>
    </div>

    <script>
        const svg = document.getElementById('space-canvas');
        const pathsGroup = document.getElementById('constellation-paths');

        for (let i = 0; i < 200; i++) {
            const x = Math.random() * 1000;
            const y = Math.random() * 1000;
            const radius = Math.random() * 1.8;

            const backgroundStar = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            backgroundStar.setAttribute("cx", x);
            backgroundStar.setAttribute("cy", y);
            backgroundStar.setAttribute("r", radius);
            backgroundStar.setAttribute("fill", "#ffffff");
            
            const duration = Math.random() * 3 + 2; 
            const delay = Math.random() * -5; 
            
            backgroundStar.style.animation = `twinkle ${duration}s infinite ease-in-out ${delay}s`;
            
            svg.insertBefore(backgroundStar, svg.firstChild);
        }

        const starMessages = {
            "star-tegmine": {
                title: "✨ Tegmine",
                text: "Geçici Olarak Boş"
            },
            "star-borealis": {
                title: "✨ Asellus Borealis",
                text: "Geçici Olarak Boş"
            },
            "star-australis": {
                title: "✨ Asellus Australis",
                text: "Geçici Olarak Boş"
            },
            "star-acubens": {
                title: "✨ Acubens",
                text: "Geçici Olarak Boş"
            },
            "star-altarf": {
                title: "✨ Altarf",
                text: "Geçici Olarak Boş"
            }
        };

        const modal = document.getElementById('message-modal');
        const modalTitle = document.getElementById('modal-title');
        const modalText = document.getElementById('modal-text');
        const closeBtn = document.getElementById('close-modal');

        document.querySelectorAll('.cancer-star').forEach(star => {
            star.addEventListener('click', (e) => {
                const starId = e.target.id;
                const messageData = starMessages[starId];

                if (messageData) {
                    modalTitle.innerText = messageData.title;
                    modalText.innerText = messageData.text;
                    modal.classList.add('active');
                }
            });
        });

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // MÜZİK VE GİRİŞ EKRANI SCRİPTİ
        const audio = document.getElementById('bg-audio');
        const musicBtn = document.getElementById('music-toggle');
        const musicIcon = document.getElementById('music-icon');
        const musicText = document.getElementById('music-text');
        const welcomeScreen = document.getElementById('welcome-screen');
        let isPlaying = false;

        // Tarayıcıların "Kullanıcı tıklamadan müzik çalamazsın" kuralını aşmak için giriş perdesi eklendi.
        // Arkadaşın ekrana ilk dokunduğu anda perde yavaşça eriyerek kaybolur ve müzik tam o an kusursuzca BAŞLAR.
        welcomeScreen.addEventListener('click', () => {
            welcomeScreen.classList.add('hidden');
            audio.play().then(() => {
                isPlaying = true;
            }).catch(err => console.log("Oynatma hatası:", err));
        });

        // Sağ üstteki kontrol butonu yine de dursun (isterse kapatabilsin diye)
        musicBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                musicBtn.classList.remove('playing');
                musicIcon.innerText = '🎵';
                musicText.innerText = 'Müziği Aç';
            } else {
                audio.play();
                musicBtn.classList.add('playing');
                musicIcon.innerText = '⏸️';
                musicText.innerText = 'Durdur';
            }
            isPlaying = !isPlaying;
        });
    </script>
</body>
</html>
